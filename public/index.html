<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>infonews.day — Actualités du monde</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
    }

    header {
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #fff;
    }

    header h1 span { color: #4ade80; }

    #status {
      font-size: 0.75rem;
      color: #888;
    }

    #status.loading { color: #facc15; }
    #status.ok { color: #4ade80; }
    #status.error { color: #f87171; }

    nav {
      background: #161616;
      padding: 0.6rem 2rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      border-bottom: 1px solid #2a2a2a;
    }

    nav button {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #ccc;
      padding: 0.35rem 0.9rem;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    nav button:hover, nav button.active {
      background: #4ade80;
      color: #000;
      border-color: #4ade80;
      font-weight: 600;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }

    #stats {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 1.2rem;
    }

    #articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #444;
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: #222;
    }

    .card-img-placeholder {
      width: 100%;
      height: 160px;
      background: linear-gradient(135deg, #1e1e1e, #2a2a2a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }

    .card-body {
      padding: 1rem;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .badge-source {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-source.bbc { background: #ef4444; color: #fff; }
    .badge-source.lemonde { background: #3b82f6; color: #fff; }
    .badge-source.newsapi { background: #8b5cf6; color: #fff; }
    .badge-source.other { background: #374151; color: #ccc; }

    .card-date {
      font-size: 0.7rem;
      color: #666;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.4;
      color: #f0f0f0;
      margin-bottom: 0.5rem;
    }

    .card-summary {
      font-size: 0.8rem;
      color: #999;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-link {
      display: block;
      margin-top: 0.8rem;
      font-size: 0.75rem;
      color: #4ade80;
      text-decoration: none;
    }

    .card-link:hover { text-decoration: underline; }

    #loader {
      text-align: center;
      padding: 3rem;
      color: #666;
    }

    #loader .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #4ade80;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center;
      padding: 2rem;
      color: #444;
      font-size: 0.75rem;
      border-top: 1px solid #1f1f1f;
      margin-top: 3rem;
    }
  </style>
</head>
<body>

<header>
  <h1>info<span>news</span>.day</h1>
  <span id="status" class="loading">Chargement...</span>
</header>

<nav>
  <button class="active" onclick="filterSource('all', this)">Toutes les sources</button>
  <button onclick="filterSource('BBC', this)">BBC</button>
  <button onclick="filterSource('Le Monde', this)">Le Monde</button>
  <button onclick="filterSource('NewsAPI', this)">NewsAPI</button>
</nav>

<main>
  <p id="stats"></p>
  <div id="loader">
    <div class="spinner"></div>
    <p>Récupération des actualités en cours...</p>
  </div>
  <div id="articles-grid" style="display:none;"></div>
</main>

<footer>
  infonews.day &mdash; Agrégateur automatisé &mdash; Sources : BBC, Le Monde, NewsAPI
</footer>

<script>
  let allArticles = [];
  let currentSource = 'all';

  function getSourceClass(source) {
    if (source === 'BBC') return 'bbc';
    if (source === 'Le Monde') return 'lemonde';
    if (source && source.toLowerCase().includes('newsapi')) return 'newsapi';
    return 'other';
  }

  function formatDate(isoString) {
    try {
      return new Intl.DateTimeFormat('fr-FR', {
        day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
      }).format(new Date(isoString));
    } catch { return ''; }
  }

  function renderArticles(articles) {
    const grid = document.getElementById('articles-grid');
    if (!articles.length) {
      grid.innerHTML = '<p style="color:#666;grid-column:1/-1;text-align:center;padding:2rem;">Aucun article disponible.</p>';
      return;
    }
    grid.innerHTML = articles.map(a => `
      <div class="card" onclick="window.open('${a.url}','_blank')">
        ${a.imageUrl
          ? `<img src="${a.imageUrl}" alt="" loading="lazy" onerror="this.parentNode.querySelector('.card-img-placeholder').style.display='flex';this.style.display='none'">`
          : ''}
        <div class="card-img-placeholder" style="display:${a.imageUrl ? 'none' : 'flex'}">&#x1F4F0;</div>
        <div class="card-body">
          <div class="card-meta">
            <span class="badge-source ${getSourceClass(a.source)}">${a.source}</span>
            <span class="card-date">${formatDate(a.publishedAt)}</span>
          </div>
          <div class="card-title">${a.title}</div>
          ${a.summary ? `<div class="card-summary">${a.summary}</div>` : ''}
          <a class="card-link" href="${a.url}" target="_blank" onclick="event.stopPropagation()">Lire l'article &rarr;</a>
        </div>
      </div>
    `).join('');
  }

  function filterSource(source, btn) {
    currentSource = source;
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = source === 'all' ? allArticles : allArticles.filter(a => a.source === source);
    document.getElementById('stats').textContent = `${filtered.length} article(s) affiché(s)`;
    renderArticles(filtered);
  }

  async function loadNews() {
    const statusEl = document.getElementById('status');
    const loader = document.getElementById('loader');
    const grid = document.getElementById('articles-grid');

    try {
      const resp = await fetch('/api/news');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();

      allArticles = data.articles || [];
      loader.style.display = 'none';
      grid.style.display = 'grid';

      statusEl.className = 'ok';
      statusEl.textContent = `${allArticles.length} articles — ${new Date(data.fetchedAt).toLocaleTimeString('fr-FR')}`;
      document.getElementById('stats').textContent = `${allArticles.length} article(s) au total`;

      renderArticles(allArticles);
    } catch (err) {
      loader.style.display = 'none';
      grid.style.display = 'grid';
      statusEl.className = 'error';
      statusEl.textContent = 'Erreur de chargement';
      grid.innerHTML = `<p style="color:#f87171;grid-column:1/-1;text-align:center;padding:2rem;">
        Impossible de charger les news : ${err.message}<br>
        <small style="color:#666">Vérifie que le serveur tourne sur le port 3000</small>
      </p>`;
      console.error('[infonews] Erreur:', err);
    }
  }

  // Chargement initial
  loadNews();

  // Rafraîchissement toutes les 10 minutes
  setInterval(loadNews, 10 * 60 * 1000);
</script>

</body>
</html>
